<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Maranelo Veículos</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grupo { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        input, button { padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; padding: 8px 15px; }
        .btn-excluir { background: #f44336; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #333; color: white; }
    </style>
</head>
<body>
<h1>Maranelo Veiculos</h1>

<div class="card">
    <div class="grupo">
        <input type="text" id="marca" placeholder="Marca" size="10">
        <input type="text" id="modelo" placeholder="Modelo" size="10">
        <input type="number" id="ano" placeholder="Ano" size="8">
        <input type="text" id="cor" placeholder="Cor" size="8">
        <input type="number" id="preco" placeholder="Preco" size="10">
        <button onclick="cadastrar()">Cadastrar</button>
    </div>
    <div class="grupo">
        <input type="text" id="busca" placeholder="Buscar marca" size="12">
        <button onclick="buscar()">Buscar</button>
        <button onclick="mostrarTodos()">Mostrar Todos</button>
        <input type="number" id="reajuste" placeholder="Aumento %" size="8">
        <button onclick="reajustar()">Reajustar</button>
    </div>
</div>

<table>
    <thead><tr><th>Marca</th><th>Modelo</th><th>Ano</th><th>Cor</th><th>Preco</th><th></th></tr></thead>
    <tbody id="lista"></tbody>
</table>
<p>Total: <span id="total">0</span> veiculos</p>

<script>
let veiculos = [{id:1,marca:"Volkswagen",modelo:"Gol",ano:2020,cor:"Prata",preco:45000},{id:2,marca:"Fiat",modelo:"Uno",ano:2019,cor:"Branco",preco:32000}];
let exibir = [...veiculos];

function atualizar() {
    let html = "";
    for(let v of exibir) html += `<tr><td>${v.marca}</td><td>${v.modelo}</td><td>${v.ano}</td><td>${v.cor}</td><td>R$ ${v.preco}</td><td><button class="btn-excluir" onclick="excluir(${v.id})">Excluir</button></td></tr>`;
    document.getElementById("lista").innerHTML = html || "<tr><td colspan='6'>Nenhum veiculo cadastrado</td></tr>";
    document.getElementById("total").innerText = veiculos.length;
}

function cadastrar() {
    let m = document.getElementById("marca").value;
    let mo = document.getElementById("modelo").value;
    let a = document.getElementById("ano").value;
    let c = document.getElementById("cor").value;
    let p = document.getElementById("preco").value;
    if(!m || !mo || !a || !c || !p) return alert("Preencha todos os campos");
    veiculos.push({id:Date.now(), marca:m, modelo:mo, ano:a, cor:c, preco:Number(p)});
    document.getElementById("marca").value = "";
    document.getElementById("modelo").value = "";
    document.getElementById("ano").value = "";
    document.getElementById("cor").value = "";
    document.getElementById("preco").value = "";
    exibir = [...veiculos];
    atualizar();
}

function buscar() {
    let busca = document.getElementById("busca").value;
    exibir = busca ? veiculos.filter(v => v.marca === busca) : [...veiculos];
    atualizar();
}

function mostrarTodos() {
    document.getElementById("busca").value = "";
    exibir = [...veiculos];
    atualizar();
}

function reajustar() {
    let p = Number(document.getElementById("reajuste").value);
    if(p <= 0) return alert("Digite um percentual");
    if(confirm("Aumentar " + p + "% em todos?")) veiculos.forEach(v => v.preco += v.preco * p / 100);
    exibir = [...veiculos];
    atualizar();
    document.getElementById("reajuste").value = "";
}

function excluir(id) {
    if(confirm("Excluir?")) veiculos = veiculos.filter(v => v.id !== id);
    exibir = [...veiculos];
    atualizar();
}

atualizar();
</script>
</body>
</html>
